<div class="profile-container">
  @if (store.currentUser(); as user) {
    <mat-card class="profile-card">
      <div class="avatar-section">
        <mat-icon class="avatar-icon">account_circle</mat-icon>
        <h2>{{ user.name }}</h2>
        <mat-chip-set>
          <mat-chip>{{ roleLabel(user.role) }}</mat-chip>
        </mat-chip-set>
      </div>

      <mat-divider />

      <mat-card-content>
        <div class="info-row">
          <mat-icon>email</mat-icon>
          <div>
            <p class="info-label">Correo electrónico</p>
            <p class="info-value">{{ user.email }}</p>
          </div>
        </div>

        <div class="info-row">
          <mat-icon>badge</mat-icon>
          <div>
            <p class="info-label">ID de usuario</p>
            <p class="info-value">{{ user.id }}</p>
          </div>
        </div>

        <div class="info-row">
          <mat-icon>workspace_premium</mat-icon>
          <div>
            <p class="info-label">Tipo de cuenta</p>
            <p class="info-value">{{ roleLabel(user.role) }}</p>
          </div>
        </div>
      </mat-card-content>

      <mat-card-actions>
        <button mat-button (click)="goBack()">
          <mat-icon>arrow_back</mat-icon>
          Volver
        </button>
        <button mat-button color="warn" (click)="logout()">
          <mat-icon>logout</mat-icon>
          Cerrar sesión
        </button>
      </mat-card-actions>
    </mat-card>
  }
</div>
